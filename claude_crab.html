<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Crab</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d1a; display: flex; flex-direction: column; min-height: 100vh; margin:0; }
    #wrap { width: 100%; font-family: 'Press Start 2P', monospace; display: flex; flex-direction: column; flex: 1; }

    /* ── APIキー設定バー ── */
    #apibar {
      background: #0a0a18; padding: 12px 18px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 2px solid #2a2a4a; flex-wrap: wrap;
    }
    #apibar label { color: #ffffff55; font-size: 11px; flex-shrink: 0; }
    #apikey-input {
      flex: 1; background: #111128; border: 1px solid #3a3a6a; outline: none;
      color: #88ffcc; font-family: 'Press Start 2P', monospace; font-size: 11px;
      padding: 8px 12px; min-width: 200px;
    }
    #apikey-save {
      background: #0d0d1a; border: none; outline: none; color: #C96A42;
      font-family: 'Press Start 2P', monospace; font-size: 11px; padding: 8px 14px; cursor: pointer;
      box-shadow: 2px 0 0 #5566aa,0 2px 0 #5566aa,2px 2px 0 #5566aa,-2px 0 0 #222244,0 -2px 0 #222244,-2px -2px 0 #222244;
    }
    #apikey-save:hover { background: #1a1a3a; }
    #api-status { font-size: 11px; color: #ffffff44; }
    #api-status.ok { color: #44ff88; }
    #api-status.err { color: #ff6666; }

    /* ── ツールバー ── */
    #toolbar {
      background: #0d0d1a; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 3px solid #3a3a5a; flex-wrap: wrap;
    }
    #toolbar span { color: #ffffff55; font-size: 11px; letter-spacing: 1px; }
    .tbtn {
      background: #0d0d1a; border: none; outline: none; color: #aaddff;
      font-size: 11px; padding: 9px 16px; cursor: pointer;
      font-family: 'Press Start 2P', monospace; line-height: 1.4;
      box-shadow: 3px 0 0 #5566aa,0 3px 0 #5566aa,3px 3px 0 #5566aa,-3px 0 0 #222244,0 -3px 0 #222244,-3px -3px 0 #222244;
    }
    .tbtn:hover { background: #1a1a3a; color: #fff; }
    .tbtn:active { box-shadow:-3px 0 0 #5566aa,0 -3px 0 #5566aa,-3px -3px 0 #5566aa,3px 0 0 #222244,0 3px 0 #222244,3px 3px 0 #222244; transform:translate(3px,3px); }
    .tbtn.on { background:#112233; color:#44ffcc; box-shadow:-3px 0 0 #5566aa,0 -3px 0 #5566aa,-3px -3px 0 #5566aa,3px 0 0 #222244,0 3px 0 #222244,3px 3px 0 #222244; transform:translate(2px,2px); }
    .tbtn:disabled { color:#ffffff22; cursor:default; }
    #status-dot { width:12px; height:12px; background:#44ff88; margin-left:auto; flex-shrink:0; }
    #status-dot.spin { background:#ffaa44; animation:pulse 0.6s steps(1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0} }
    #last-fetch { color:#ffffff44; font-size:11px; }

    /* ── カニ舞台 16:9 ── */
    #crab-world { background:#0a0a14; width:100%; flex:1; min-height:300px; position:relative; overflow:hidden; border-top:2px solid #2a2a4a; }
    #bg-svg { position:absolute; top:0; left:0; width:100%; height:100%; image-rendering:pixelated; }
    .floor { position:absolute; bottom:0;left:0;right:0; height:8%; background:#0f1520; border-top:3px solid #1e2d45; z-index:2; }
    #crab-group { position:absolute; bottom:8%; z-index:3; }
    #bubble {
      position:absolute; bottom:calc(8% + 195px);
      background:#e8f0ff; color:#111;
      font-size:20px; padding:18px 22px;
      width:340px; white-space:normal; line-height:1.9;
      display:none; pointer-events:none; z-index:10;
      font-family:'M PLUS Rounded 1c','Press Start 2P',monospace; font-weight:700;
      border-radius:14px; box-shadow:5px 5px 0 #334; border:3px solid #334;
    }
    #bubble::after { content:''; position:absolute; bottom:-14px; left:24px; width:12px; height:12px; background:#e8f0ff; border-right:3px solid #334; border-bottom:3px solid #334; transform:rotate(45deg); }
    #bubble.reply { background:#fff8e0; border-color:#C96A42; box-shadow:5px 5px 0 #8a3a00; }
    #bubble.reply::after { background:#fff8e0; border-color:#C96A42; }
    #bubble.en { font-family:'Press Start 2P',monospace; font-size:13px; line-height:2.2; }
    #crab-svg { display:block; cursor:pointer; }
    .zzz { position:absolute; color:#aaaaff; font-size:16px; display:none; pointer-events:none; font-family:'Press Start 2P',monospace; animation:floatZ 1.8s steps(4) infinite; z-index:10; }
    @keyframes floatZ { 0%{opacity:0;transform:translateY(0)} 30%{opacity:1;transform:translateY(-6px)} 70%{opacity:1;transform:translateY(-16px)} 100%{opacity:0;transform:translateY(-24px)} }
    #state-label { position:absolute; top:10px; left:14px; color:#ffffff22; font-size:9px; z-index:10; }
    #news-ticker { position:absolute; bottom:calc(8% + 2px); left:0; right:0; background:#08081acc; color:#44ffaa; font-size:18px; padding:8px 16px; white-space:nowrap; overflow:hidden; pointer-events:auto; line-height:1.8; border-top:2px solid #1a2a4a; cursor:default; z-index:5; }
    #news-ticker.ja { font-family:'M PLUS Rounded 1c',sans-serif; font-weight:700; }
    #news-ticker.en { font-family:'Press Start 2P',monospace; font-size:13px; }
    #news-ticker-inner { display:inline-block; animation:ticker 50s linear infinite; }
    #news-ticker-inner a.news-item { color:#44ffaa; text-decoration:none; border-bottom:1px dashed #44ffaa66; padding-bottom:1px; cursor:pointer; transition:color 0.15s; }
    #news-ticker-inner a.news-item:hover { color:#ffffff; border-bottom-color:#fff; }
    @keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-200%)} }

    /* ── 天体・雲 ── */
    #sun-moon, #sun-moon-glow, #sky-bg, #stars, #windows {
      transition: fill 1.5s ease, opacity 1.5s ease, cy 3s ease, cx 3s ease, r 1.5s ease;
    }
    #cloud1 { animation: cloudDrift1 90s linear infinite; }
    #cloud2 { animation: cloudDrift2 130s linear infinite; }
    #cloud3 { animation: cloudDrift3 70s linear infinite; }
    @keyframes cloudDrift1 { 0%{transform:translateX(-200px)} 100%{transform:translateX(1800px)} }
    @keyframes cloudDrift2 { 0%{transform:translateX(-300px)} 100%{transform:translateX(1900px)} }
    @keyframes cloudDrift3 { 0%{transform:translateX(-150px)} 100%{transform:translateX(1750px)} }
    #stars { transition: opacity 1.5s ease; }

    /* ── ステータス表示（時計・日付・天気） ── */
    #now-status {
      background:#0d0d1a;
      padding:14px 22px;
      font-family:'Press Start 2P',monospace;
      border-right: 2px solid #2a2a4a;
      display:flex; align-items:center; gap:24px;
      white-space:nowrap;
      flex-wrap: wrap;
    }
    #now-clock {
      color:#fff; font-size:32px; font-weight:700;
      letter-spacing:2px; line-height:1;
      font-family:'Press Start 2P',monospace;
    }
    #now-date {
      color:#ffd8aa; font-size:12px; line-height:1.7;
      display:flex; flex-direction:column;
      font-family:'Press Start 2P',monospace;
    }
    #now-date .weekday { color:#88ddff; font-size:12px; }
    #now-weather {
      color:#ffe8aa; font-size:14px;
      display:flex; align-items:center; gap:8px;
      font-family:'Press Start 2P',monospace;
    }
    #now-weather .weather-icon { font-size:30px; }
    #now-activity {
      color:#aaffcc; font-size:14px;
      display:flex; align-items:center; gap:8px;
      font-family:'Press Start 2P',monospace;
    }
    #now-activity .now-icon { font-size:26px; }

    /* ── 時間帯アイテム（カニの周りに浮かぶ） ── */
    #time-item {
      position:absolute; font-size:48px; pointer-events:none; z-index:8;
      display:none;
      animation: itemFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px #00000088);
    }
    @keyframes itemFloat {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%     { transform: translateY(-12px) rotate(5deg); }
    }
    /* 流れ星 */
    #shooting-star {
      position:absolute; width:3px; height:3px; background:#fff;
      border-radius:50%; display:none; z-index:1;
      box-shadow: 0 0 6px 2px #ffffffaa;
    }
    @keyframes shootingStar {
      0%   { transform: translate(0,0) scale(1); opacity:1; }
      100% { transform: translate(-300px,200px) scale(0.3); opacity:0; }
    }

    /* ── ログパネル ── */
    #log-panel {
      display:none; background:#0a0a12;
      border-top:3px solid #5566aa;
      max-height:260px; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:#334 transparent;
    }
    #log-panel::-webkit-scrollbar { width:4px; }
    #log-panel::-webkit-scrollbar-thumb { background:#334; }
    #log-header {
      background:#111128; padding:8px 14px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #2a2a4a; position:sticky; top:0; z-index:1;
    }
    #log-header span { color:#aaddff; font-size:11px; }
    #log-clear { background:none; border:none; color:#ff6666; font-family:'Press Start 2P',monospace; font-size:11px; cursor:pointer; padding:4px 10px; }
    #log-clear:hover { color:#ff9999; }
    #log-list { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
    .log-entry { display:flex; flex-direction:column; gap:6px; }
    .log-time { color:#ffffff44; font-size:11px; font-family:'Press Start 2P',monospace; }
    .log-user { background:#1a2a1a; border-left:4px solid #44ffaa; padding:12px 16px; border-radius:0 10px 10px 0; }
    .log-user-label { color:#44ffaa; font-size:12px; font-family:'Press Start 2P',monospace; margin-bottom:6px; }
    .log-crab { background:#2a1a0a; border-left:4px solid #C96A42; padding:12px 16px; border-radius:0 10px 10px 0; }
    .log-crab-label { color:#C96A42; font-size:12px; font-family:'Press Start 2P',monospace; margin-bottom:6px; }
    .log-text { color:#ccddff; font-family:'M PLUS Rounded 1c',sans-serif; font-size:18px; font-weight:700; line-height:1.7; }
    #log-empty { color:#ffffff33; font-size:12px; font-family:'Press Start 2P',monospace; text-align:center; padding:30px; }

    /* ── チャットバー ── */
    #chat-bar { background:#0a0a0f; border-top:3px solid #C96A42; display:flex; align-items:center; padding:18px 22px; gap:16px; }
    #chat-prompt { color:#44ffaa; font-size:20px; flex-shrink:0; }
    #chat-input { flex:1; background:transparent; border:none; outline:none; color:#88ffcc; font-family:'M PLUS Rounded 1c','Press Start 2P',monospace; font-weight:700; font-size:20px; line-height:1.6; caret-color:#44ffaa; border-bottom:2px solid #3a3a6a; padding-bottom:6px; }
    #chat-input::placeholder { color:#ffffff33; font-size:18px; }
    #chat-send { background:#0d0d1a; border:none; outline:none; color:#C96A42; font-family:'Press Start 2P',monospace; font-size:12px; padding:12px 18px; cursor:pointer; flex-shrink:0; box-shadow:3px 0 0 #5566aa,0 3px 0 #5566aa,3px 3px 0 #5566aa,-3px 0 0 #222244,0 -3px 0 #222244,-3px -3px 0 #222244; }
    #chat-send:hover { background:#1a1a3a; color:#ffaa44; }
    #chat-send:active { transform:translate(3px,3px); box-shadow:-3px 0 0 #5566aa,0 -3px 0 #5566aa,-3px -3px 0 #5566aa,3px 0 0 #222244,0 3px 0 #222244,3px 3px 0 #222244; }
  </style>
</head>
<body>
<div id="wrap">

  <!-- APIキー設定バー -->
  <div id="apibar">
    <label>GROQ API KEY ▶</label>
    <input id="apikey-input" type="password" placeholder="gsk_xxxxxxxxxxxx"/>
    <button id="apikey-save">SAVE</button>
    <span id="api-status">未設定</span>
  </div>

  <!-- 現在のステータス -->
  <div id="now-status">
    <div id="now-clock">--:--</div>
    <div id="now-date">
      <span class="ymd">----/--/--</span>
      <span class="weekday">---</span>
    </div>
    <div id="now-weather">
      <span class="weather-icon">🌤️</span>
      <span id="now-weather-text">Tokyo --°C</span>
    </div>
    <div id="now-activity">
      <span class="now-icon">🦀</span>
      <span id="now-status-text">---</span>
    </div>
  </div>

  <!-- ツールバー -->
  <div id="toolbar">
    <span>▶ CONFIG</span>
    <button class="tbtn" id="lang-toggle">🌐 JP</button>
    <button class="tbtn on" id="news-toggle">📡 NEWS ON</button>
    <button class="tbtn" id="refresh-btn">🔄 RELOAD</button>
    <button class="tbtn on" id="mute-btn">♪ ON</button>
    <button class="tbtn" id="log-btn">📋 LOG</button>
    <span id="last-fetch">--:--</span>
    <div id="status-dot"></div>
  </div>

  <!-- カニ舞台 -->
  <div id="crab-world">
    <!-- SVG背景：16:9ドット絵街並み -->
    <svg id="bg-svg" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <circle cx="10" cy="10" r="1.2" fill="#ffffff10"/>
        </pattern>
      </defs>
      <!-- 空 -->
      <rect id="sky-bg" width="1600" height="900" fill="#0a0a14"/>
      <!-- 太陽/月 -->
      <g id="celestial">
        <circle id="sun-moon" cx="800" cy="700" r="60" fill="#fff5cc"/>
        <circle id="sun-moon-glow" cx="800" cy="700" r="90" fill="#fff5cc" opacity="0.15"/>
      </g>
      <!-- 雲（流れる） -->
      <g id="clouds" opacity="0.5">
        <g id="cloud1">
          <rect x="0" y="120" width="120" height="20" fill="#ffffff"/>
          <rect x="20" y="105" width="80" height="20" fill="#ffffff"/>
          <rect x="40" y="95" width="40" height="15" fill="#ffffff"/>
        </g>
        <g id="cloud2">
          <rect x="0" y="200" width="160" height="24" fill="#ffffff"/>
          <rect x="30" y="180" width="90" height="24" fill="#ffffff"/>
          <rect x="60" y="165" width="50" height="18" fill="#ffffff"/>
        </g>
        <g id="cloud3">
          <rect x="0" y="160" width="100" height="18" fill="#ffffff"/>
          <rect x="15" y="148" width="60" height="16" fill="#ffffff"/>
        </g>
      </g>
      <!-- 星 -->
      <g id="stars">
        <rect x="120" y="40" width="3" height="3" fill="#ffffff44"/>
        <rect x="280" y="80" width="2" height="2" fill="#ffffff33"/>
        <rect x="450" y="30" width="3" height="3" fill="#ffffff55"/>
        <rect x="620" y="60" width="2" height="2" fill="#ffffff33"/>
        <rect x="800" y="25" width="4" height="4" fill="#ffffff44"/>
        <rect x="980" y="70" width="2" height="2" fill="#ffffff33"/>
        <rect x="1150" y="45" width="3" height="3" fill="#ffffff55"/>
        <rect x="1350" y="30" width="2" height="2" fill="#ffffff33"/>
        <rect x="1480" y="65" width="3" height="3" fill="#ffffff44"/>
        <rect x="60"  y="110" width="2" height="2" fill="#ffffff22"/>
        <rect x="360" y="120" width="2" height="2" fill="#ffffff22"/>
        <rect x="700" y="100" width="2" height="2" fill="#ffffff22"/>
        <rect x="1050" y="130" width="2" height="2" fill="#ffffff22"/>
        <rect x="1400" y="110" width="2" height="2" fill="#ffffff22"/>
      </g>
      <!-- ドットパターン -->
      <rect width="1600" height="900" fill="url(#dots)"/>
      <!-- 遠景：建物シルエット（淡い） -->
      <rect x="0"    y="480" width="80"  height="220" fill="#1a1a2e"/>
      <rect x="20"   y="420" width="40"  height="60"  fill="#1a1a2e"/>
      <rect x="30"   y="400" width="20"  height="20"  fill="#1a1a2e"/>
      <rect x="100"  y="380" width="120" height="320" fill="#161626"/>
      <rect x="120"  y="340" width="80"  height="40"  fill="#161626"/>
      <rect x="140"  y="300" width="40"  height="40"  fill="#161626"/>
      <rect x="145"  y="280" width="30"  height="20"  fill="#161626"/>
      <rect x="240"  y="440" width="100" height="260" fill="#12121f"/>
      <rect x="260"  y="400" width="60"  height="40"  fill="#12121f"/>
      <rect x="360"  y="350" width="160" height="350" fill="#1a1a2e"/>
      <rect x="380"  y="290" width="120" height="60"  fill="#1a1a2e"/>
      <rect x="400"  y="250" width="80"  height="40"  fill="#1a1a2e"/>
      <rect x="415"  y="220" width="50"  height="30"  fill="#1a1a2e"/>
      <rect x="430"  y="200" width="20"  height="20"  fill="#1a1a2e"/>
      <rect x="540"  y="460" width="80"  height="240" fill="#161626"/>
      <rect x="560"  y="420" width="40"  height="40"  fill="#161626"/>
      <rect x="640"  y="390" width="140" height="310" fill="#1a1a2e"/>
      <rect x="660"  y="330" width="100" height="60"  fill="#1a1a2e"/>
      <rect x="680"  y="290" width="60"  height="40"  fill="#1a1a2e"/>
      <rect x="800"  y="420" width="100" height="280" fill="#12121f"/>
      <rect x="820"  y="380" width="60"  height="40"  fill="#12121f"/>
      <rect x="835"  y="350" width="30"  height="30"  fill="#12121f"/>
      <rect x="920"  y="360" width="180" height="340" fill="#1a1a2e"/>
      <rect x="940"  y="300" width="140" height="60"  fill="#1a1a2e"/>
      <rect x="960"  y="260" width="100" height="40"  fill="#1a1a2e"/>
      <rect x="975"  y="230" width="70"  height="30"  fill="#1a1a2e"/>
      <rect x="985"  y="210" width="50"  height="20"  fill="#1a1a2e"/>
      <rect x="1120" y="450" width="90"  height="250" fill="#161626"/>
      <rect x="1140" y="410" width="50"  height="40"  fill="#161626"/>
      <rect x="1230" y="400" width="130" height="300" fill="#1a1a2e"/>
      <rect x="1250" y="350" width="90"  height="50"  fill="#1a1a2e"/>
      <rect x="1265" y="320" width="60"  height="30"  fill="#1a1a2e"/>
      <rect x="1380" y="470" width="100" height="230" fill="#12121f"/>

      <rect x="1520" y="340" width="60"  height="30"  fill="#1a1a2e"/>
      <!-- 建物の窓（ランダムに光っている） -->
      <g id="windows">
      <rect x="108"  y="450" width="8" height="12" fill="#ffeeaa22"/>
      <rect x="124"  y="450" width="8" height="12" fill="#ffeeaa33"/>
      <rect x="108"  y="480" width="8" height="12" fill="#ffeeaa22"/>
      <rect x="150"  y="370" width="10" height="14" fill="#aaddff33"/>

      <rect x="690"  y="380" width="12" height="16" fill="#aaddff33"/>
      <rect x="940"  y="320" width="14" height="18" fill="#ffeeaa44"/>
      <rect x="966"  y="320" width="14" height="18" fill="#ffeeaa33"/>

      <rect x="966"  y="354" width="14" height="18" fill="#ffeeaa44"/>

      <rect x="1510" y="390" width="12" height="16" fill="#ffeeaa33"/>
      <rect x="1536" y="390" width="12" height="16" fill="#ffeeaa44"/>
      </g>
      <!-- 中景：より濃いシルエット -->
      <rect x="0"    y="600" width="60"  height="200" fill="#0f1520"/>
      <rect x="70"   y="560" width="90"  height="240" fill="#0f1520"/>
      <rect x="80"   y="530" width="70"  height="30"  fill="#0f1520"/>
      <rect x="90"   y="510" width="50"  height="20"  fill="#0f1520"/>
      <rect x="180"  y="580" width="70"  height="220" fill="#111830"/>

  { name:'MIT Tech Review',url:'https://www.technologyreview.com/feed/' },
];
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

async function fetchRssNews(){
  const feeds = lang==='ja' ? RSS_FEEDS_JA : RSS_FEEDS_EN;
  const results = [];
  // 並列取得で高速化
  const promises = feeds.map(async feed=>{
    try{
      const res = await fetch(RSS2JSON + encodeURIComponent(feed.url) + '&count=2');
      const data = await res.json();
      if(data.status==='ok' && data.items?.length){
        // 各フィードから最新2件まで取得
        data.items.slice(0,2).forEach(item=>{
          results.push({ title: item.title, link: item.link, source: feed.name });
        });
      }
    }catch(e){}
  });
  await Promise.all(promises);
  // 最大10件にしてシャッフル
  return results.sort(()=>Math.random()-0.5).slice(0,10);
}

async function doReload(){

}

async function sendChat(){
  const msg=chatInput.value.trim(); if(!msg)return;
  chatInput.value=''; playDecide();
  chatLock=true;
  // カニを止めるだけ（setState('stop')は呼ばない→自動つぶやきが出ない）
  state='stop'; stateTimer=200;
  setFace('surprised');
  chatHistory.push({role:'user',content:msg});

  if(groqApiKey){
    const isJa=lang==='ja';
    const sp=isJa
      ?`あなたは「クロードくん」というカニのキャラクターです。ユーザーと会話してください。返答は1〜2文のゆるくかわいい口調で。AIやClaudeの話題には詳しく答えてOK。絵文字1個まで。`
      :`You are "Claude the Crab", a cute pixel crab. Reply in 1-2 short casual sentences. AI/Claude topics OK. Max 1 emoji.`;
    // システムプロンプトを先頭に付けてhistory送信
    const messages=[{role:'system',content:sp},...chatHistory];
    try{
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${groqApiKey}`},
        body:JSON.stringify({ model:'llama-3.1-8b-instant', max_tokens:200, messages })
      });
      const data=await res.json();
      const reply=data.choices?.[0]?.message?.content?.trim();
      if(reply){
        chatHistory.push({role:'assistant',content:reply});
        addLog(msg, reply);
        showBubble(reply,'reply'); setFace('normal'); playReply();
        return;
      }
    }catch(e){}
  }
  // APIなしフォールバック
  const replies=lang==='ja'?REPLIES_JA:REPLIES_EN;
  const reply=replies[Math.floor(Math.random()*replies.length)];
  chatHistory.push({role:'assistant',content:reply});
  addLog(msg, reply);
  showBubble(reply,'reply'); setFace('normal'); playReply();
}

// ── カニの動作制御 ──
let walkSpeed = 1.1;   // 通常速度
let jumpY = 0;         // ジャンプY位置
let jumpVY = 0;        // ジャンプ速度
let isJumping = false;
let turnTimer = 0;     // 振り返りタイマー
let isTurning = false;
let slowWalkTimer = 0; // ゆっくり歩きタイマー

function startJump(){
  if(isJumping) return;
  isJumping=true; jumpVY=-12;
  playBeep(660,'square',0.08,0.15);
}

function setState(s){
  state=s; stateLabel.textContent=s.toUpperCase();
  if(s==='walk'){
    zzz.style.display='none'; setFace('normal');
    walkSpeed=1.1; isTurning=false;
    stateTimer=250+Math.random()*300;
  } else if(s==='walk_slow'){
    zzz.style.display='none'; setFace('sleepy');
    walkSpeed=0.4; stateTimer=180+Math.random()*200; state='walk_slow';
  } else if(s==='stop'){
    zzz.style.display='none'; walkSpeed=1.1;
    stateTimer=200+Math.random()*200;
    const tweets=lang==='ja'?TWEETS_JA:TWEETS_EN;
    if(firstMessage){ playBeep(523,'square',0.1,0.15); firstMessage=false; }
    showBubble(tweets[tweetIdx++%tweets.length]);
    const stopFaces=['normal','normal','happy','sleepy','surprised'];
    setFace(stopFaces[Math.floor(Math.random()*stopFaces.length)]);
    setTimeout(()=>setFace('normal'),2500);
  } else if(s==='turn'){
    zzz.style.display='none'; walkSpeed=1.1; dir=-dir;
    stateTimer=60+Math.random()*80;
    setFace('surprised'); setTimeout(()=>setFace('normal'),800);
    playBeep(440,'square',0.06,0.1);
  } else if(s==='jump'){
    zzz.style.display='none'; setFace('happy');
    stateTimer=120+Math.random()*100;
    startJump(); setTimeout(()=>setFace('normal'),600);
  } else if(s==='sleep'){
    bubble.style.display='none'; setFace('sleep');
    zzz.style.display='block'; zzz.style.left=(x+100)+'px'; zzz.style.bottom='calc(8% + 185px)';
    stateTimer=400+Math.random()*300; playSleep();
  }
}

function pickNextState(){
  const r=Math.random();
  if(r<0.35)     setState('walk');
  else if(r<0.50) setState('stop');
  else if(r<0.62) setState('walk_slow');
  else if(r<0.72) setState('turn');
  else if(r<0.80) setState('jump');
  else            setState('sleep');
}

function updateBgColor(){
  const h = new Date().getHours();
  const col = BG_COLORS[h] || '#0a0a14';
  world.style.background = col;
  const bgRect = document.querySelector('#bg-svg rect#sky-bg');
  if(bgRect) bgRect.setAttribute('fill', col);

  // 太陽/月
  const cel = CELESTIAL[h] || CELESTIAL[12];
  const sunMoon = document.getElementById('sun-moon');
  const glow = document.getElementById('sun-moon-glow');
  if(sunMoon && glow){
    sunMoon.setAttribute('cx', cel[0]); sunMoon.setAttribute('cy', cel[1]);
    sunMoon.setAttribute('r', cel[2]); sunMoon.setAttribute('fill', cel[3]);
    glow.setAttribute('cx', cel[0]); glow.setAttribute('cy', cel[1]);
    glow.setAttribute('r', cel[2]*1.6); glow.setAttribute('fill', cel[4]);
  }

  // 星：夜(19-5時)に表示、昼は非表示
  const stars = document.getElementById('stars');
  const isNight = (h>=19 || h<6);
  if(stars) stars.style.opacity = isNight ? '1' : '0';

  // 雲：昼間(6-18時)に表示
  const clouds = document.getElementById('clouds');
  if(clouds) clouds.style.opacity = (h>=6 && h<19) ? '0.5' : '0.15';

  // 窓の灯り：夜は明るく、昼は消灯
  const windows = document.getElementById('windows');
  if(windows) windows.style.opacity = isNight ? '1' : '0.15';

  // ステータス表示更新（行動）：常にEN表記
  const scene = TIME_SCENES.find(s=>s.h===h) || getCurrentScene();
  const statusText = document.getElementById('now-status-text');
  if(statusText){
    statusText.textContent = scene.label_en;
  }

  // 時間帯アイテムをカニの近くに表示
  const itemEl = document.getElementById('time-item');
  if(itemEl){
    itemEl.textContent = scene.item;
    itemEl.style.display = 'block';
  }

  // 流れ星：深夜帯にランダムで発生
  if(isNight && Math.random()<0.15) triggerShootingStar();
}

function triggerShootingStar(){
  const star = document.getElementById('shooting-star');
  if(!star) return;
  const startX = 200 + Math.random()*world.clientWidth*0.6;
  const startY = 20 + Math.random()*80;
  star.style.left = startX+'px';
  star.style.top = startY+'px';
  star.style.display='block';
  star.style.animation='none';
  requestAnimationFrame(()=>{
    star.style.animation='shootingStar 1.2s ease-out forwards';
  });
  setTimeout(()=>{ star.style.display='none'; }, 1300);
}

// ── 時計・日付表示 ──
const WEEKDAYS_JA=['日','月','火','水','木','金','土'];
const WEEKDAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function updateClock(){
  const d=new Date();
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const clockEl=document.getElementById('now-clock');
  if(clockEl) clockEl.textContent=`${hh}:${mm}`;

  const ymdEl=document.querySelector('#now-date .ymd');
  const wdEl=document.querySelector('#now-date .weekday');
  if(ymdEl){
    const y=d.getFullYear(), mo=String(d.getMonth()+1).padStart(2,'0'), da=String(d.getDate()).padStart(2,'0');
    ymdEl.textContent = `${y}-${mo}-${da}`;
  }
  if(wdEl){
    const wd=d.getDay();
    wdEl.textContent = WEEKDAYS_EN[wd];
  }
}

// ── 天気（東京・Open-Meteo） ──
const WEATHER_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌦️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️',
};
function getWeatherIcon(code){ return WEATHER_ICONS[code] || '🌤️'; }

let currentWeather = null;
async function fetchWeather(){
  try{
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&current=temperature_2m,weather_code&timezone=Asia%2FTokyo');
    const data = await res.json();
    if(data.current){
      currentWeather = { temp: Math.round(data.current.temperature_2m), code: data.current.weather_code };
      renderWeather();
    }
  }catch(e){}
}
function renderWeather(){
  const iconEl=document.querySelector('#now-weather .weather-icon');
  const textEl=document.getElementById('now-weather-text');
  if(!currentWeather) return;
  if(iconEl) iconEl.textContent=getWeatherIcon(currentWeather.code);
  if(textEl){
    textEl.textContent = `Tokyo ${currentWeather.temp}°C`;
  }
}


function checkChime(){
  const d = new Date();
  const h = d.getHours(), m = d.getMinutes();
  updateBgColor();
  if(m !== 0) return;
  if(h === lastChimeHour) return;
  lastChimeHour = h;
  const scene = TIME_SCENES.find(s=>s.h===h);
  if(!scene) return;
  setTimeout(()=>{
    setFace(scene.face);
    state='stop'; stateTimer=300;
    const label = `🕐${String(h).padStart(2,'0')}:00`;
    const msg = lang==='ja' ? scene.msg_ja : scene.msg_en;
    showBubble(label+' '+msg);
    // 時報音（回数=時間、最大6回）
    const times = Math.min(h===0?12:h, 6);
    for(let i=0;i<times;i++) setTimeout(()=>playBeep(523,'square',0.12,0.25), i*350);
    setTimeout(()=>setFace('normal'), 5000);
  }, 200);
}

function loop(){
  tick++; stateTimer--;

  // ジャンプ物理（bottomは8%ベース + jumpYオフセット）
  if(isJumping){
    jumpY+=jumpVY; jumpVY+=1.5;
    if(jumpY>=0){ jumpY=0; jumpVY=0; isJumping=false; crabGroup.style.bottom='8%'; }
    else { crabGroup.style.bottom='calc(8% + '+(-jumpY)+'px)'; }
  }

  if(state==='walk' || state==='walk_slow'){
    const speed = state==='walk_slow' ? 0.4 : 1.1;
    x+=dir*speed;
    const maxX=world.clientWidth-170;
    if(x<10){x=10; dir=1;} if(x>maxX){x=maxX; dir=-1;}
    crabGroup.style.left=x+'px';
    crabSvg.style.transform=dir<0?'scaleX(-1)':'scaleX(1)';
    updateBubblePos(); clawTick++;
    // ゆっくり歩きは足の動きも遅く
    const clawSpeed = state==='walk_slow' ? 0.05 : 0.12;
    const a=Math.sin(clawTick*clawSpeed)*12;
    document.getElementById('claw-l').setAttribute('transform',`rotate(${a},0,170)`);
    document.getElementById('claw-r').setAttribute('transform',`rotate(${-a},500,170)`);
    if(tick%80===0&&Math.random()<0.2){setFace('sleepy');setTimeout(()=>setFace('normal'),1800);}
  }
  if(state==='sleep'){
    crabGroup.style.left=x+'px';
    crabSvg.style.transform=`rotate(${Math.sin(tick*0.04)*4}deg)`;
    zzz.style.left=(x+100)+'px';
  }
  if(state==='stop'||state==='turn'){
    crabGroup.style.left=x+'px'; updateBubblePos();
  }
  if(state==='jump'){
    x+=dir*1.5; // ジャンプ中も少し前進
    const maxX=world.clientWidth-170;
    if(x<10){x=10;dir=1;} if(x>maxX){x=maxX;dir=-1;}
    crabGroup.style.left=x+'px'; updateBubblePos();
    clawTick++;
    const a=Math.sin(clawTick*0.18)*18; // ジャンプ中はハサミ大きく動く
    document.getElementById('claw-l').setAttribute('transform',`rotate(${a},0,170)`);
    document.getElementById('claw-r').setAttribute('transform',`rotate(${-a},500,170)`);
  }

  if(stateTimer<=0) pickNextState();

  // 時間帯アイテムをカニの右上に追従表示
  const itemEl = document.getElementById('time-item');
  if(itemEl && itemEl.style.display==='block'){
    const offsetX = dir<0 ? -20 : 130;
    itemEl.style.left = (x+offsetX)+'px';
    itemEl.style.bottom = 'calc(8% + 175px)';
  }

  requestAnimationFrame(loop);
}
loop();
